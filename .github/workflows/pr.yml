name: Build and Dockerize

on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Build Docker image
      - name: Build Docker image
        run: docker build -t super_bot .

  smoke-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t super_bot .

      # Run the container detached, mapping 8080 → 8080. ML_RUNNER_URL is left
      # at the default (localhost:7070); no upstream will be reachable in CI,
      # which is fine — /health reports status:"ok" regardless, with
      # upstream_ok:false.
      - name: Start container
        run: |
          docker run -d --name super_bot -p 8080:8080 super_bot
          echo "Waiting for container to accept connections on :8080..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Container is up."
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become ready in 30s." >&2
          docker logs super_bot || true
          exit 1

      - name: Hit /health and assert response
        run: |
          set -e
          echo "--- /health response ---"
          curl -s -i http://localhost:8080/health | tee /tmp/health.out

          # Status line must be 200.
          if ! grep -E '^HTTP/1\.[01] 200' /tmp/health.out >/dev/null; then
            echo "FAIL: /health did not return 200" >&2
            exit 1
          fi

          # Body must report status:"ok" (upstream_ok:false is expected in CI).
          if ! grep -E '"status"\s*:\s*"ok"' /tmp/health.out >/dev/null; then
            echo "FAIL: /health body missing status:\"ok\"" >&2
            exit 1
          fi

          echo "PASS: /health returned 200 with status:\"ok\"."

      - name: Dump container logs
        if: always()
        run: docker logs super_bot || true

      - name: Stop container
        if: always()
        run: docker rm -f super_bot || true